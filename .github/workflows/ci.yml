name: CI — Lint & Test

on:
  push:
    branches: [main, priyanshu]
  pull_request:
    branches: [main]

jobs:
  # ── React client tests ──────────────────────────────────────────
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --ci
        env:
          CI: true

  # ── Backend health check ────────────────────────────────────────
  backend-check:
    name: Backend Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate backend starts
        run: |
          # Start the server in the background and check it boots without error
          timeout 10 node src/index.js &
          SERVER_PID=$!
          sleep 5
          # If the process is still running, it started successfully
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Backend started successfully"
            kill $SERVER_PID
          else
            echo "❌ Backend failed to start"
            exit 1
          fi
        env:
          PORT: 4000
          HOST: 0.0.0.0
          CORS_ORIGIN: http://localhost:3000
          RPC_URL: http://127.0.0.1:7545
          SCHOLAR_LEDGER_ADDRESS: "0x0000000000000000000000000000000000000000"
          ISSUER_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000000"
          STUDENT_PROFILE_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000000"
          ACCREDITATION_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000000"
